name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Enable Corepack (Yarn 4)
              run: corepack enable

            - name: Install dependencies
              run: yarn install --immutable

            - name: Format check
              run: yarn format:check

            - name: Build
              run: yarn ng build

            - name: Resolve Chrome binary
              run: echo "CHROME_BIN=$(which google-chrome || which google-chrome-stable || which chromium-browser)" >> "$GITHUB_ENV"

            - name: Unit tests (headless Chrome)
              run: yarn ng test --watch=false --browsers=ChromeHeadless
