name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

# Un solo deploy alla volta; annulla quelli in coda ma non quello in corso.
concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Enable Corepack (Yarn 4)
              run: corepack enable

            - name: Install dependencies
              run: yarn install --immutable

            - name: Build (base-href per project page)
              run: yarn ng build --base-href=/burracoz-client/

            - name: SPA fallback + disabilita Jekyll
              run: |
                  cp dist/index.html dist/404.html
                  touch dist/.nojekyll

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
