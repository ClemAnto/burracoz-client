@let isStack = layout() == 'stack';
@let isHorizontal = layout() == 'horizontal';
@let isVertical = layout() == 'vertical';

@if (cards()) {
	<div [attr.data-layout]="layout()"
		class="place-content-inherit"
		[ngClass]="{
			'flex': isHorizontal || isVertical,
			'w-full h-(--max-box-h) my-auto': isHorizontal,
			'flex-col h-full w-(--max-box-w) mx-auto max-w-full': isVertical,
			'grid h-(--box-h) w-(--box-w)': isStack
		}">
		@for (item of list(); track item.uid; let i = $index) {
			<div class="card-pivot relative  outline outline-amber-500"
				[ngClass]="{
					'w-[stretch] max-w-(--max-box-w)': isHorizontal,
					'h-[stretch] max-h-(--max-box-h)': isVertical,
					'col-[1/1] row-[1/1]': isStack
				}">
				
				@let offset = isStack ? offsetCurve(i) : 0;
				
				<ui-card
					[style.--offset.px]="offset * (item.faceDown ? 1 : -1)"
					[style.--z]="i"
					(click)="toggleItem(item.uid)"
					class="
						absolute left-1/2 top-1/2 -translate-1/2 
						rounded-md z-(--z) rotate-(--rotate) 
						[&>*]:translate-z-[calc(var(--prev-offset,var(--offset)))]"
					[ngClass]="{
						outline: selectedSet().has(item.uid),
						
					}"
					[style.--tween-delay]="freezeds()[item.uid]"
					[attr.tween-id]="item.uid"
					[attr.tween-data]="
						{
							'--z': i,
							'--prev-rot-y': item.faceDown ? '180deg' : '',
							'--prev-offset': offset + 'px',
						} | json
					"
					[faceDown]="item.faceDown"
					[card]="item.tag"
				/>
				
			</div>
		}
	</div>
}

<ng-content />
