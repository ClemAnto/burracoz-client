BOARD

<header class="p-2 flex gap-2">

	<button nz-button (click)="shuffle()">SHUFFLE</button>
	<button nz-button (click)="start()">START</button>
	<button nz-button (click)="move()">MOVE</button>
</header>

<div class="flex flex-col gap-2 p-2 max-w-full">
	<ui-tweener [disabled]="!animate()" 
		(tweenComplete)="onTweenComplete($event)">
		<ui-deck #drawPile [cards]="tableCards()" [faceDown]="true" layout="stack"
			(click)="willTakeFromDrawPile()"
			class="z-1 outline outline-amber-500 min-w-[200px] h-[100px]" />
			
		<ui-deck #discardPile [cards]="discardCards()" layout="stack" [faceDown]="false"
			(click)="willTakeDiscardPile()"
			class="z-2 outline outline-amber-500 min-h-[100px]"/>

		<ui-deck #myDeck [cards]="myCards()" [faceDown]="false" [selectable]="true"
			class="z-3 outline outline-amber-500 min-h-[100px]"/>

		<section class="outline outline-amber-500 min-w-[200px] min-h-[200px]" (click)="addMeld()">
			@for (meld of myMelds(); track $index) {
				<ui-deck 
					#meldPile
					[style.--z]="$index + 4"
					class="relative z-[var(--z)]"
					[cards]="meld" [selectable]="false"
					(click)="attachToMeld(meldPile); $event.stopPropagation()"/>
			}
		</section>	
	</ui-tweener>
</div>
